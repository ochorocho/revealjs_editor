name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel a previous run on the same ref when a newer commit arrives
# (saves CI minutes on PRs that get pushed to repeatedly).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PHP CI runs the five `composer ci:*` scripts. None of them touch the
  # seeded `db` content (PHPUnit Functional tests spin up their own
  # `functional_*` databases via typo3/testing-framework), so this job
  # skips the npm install + ddev restart dance the Playwright job needs.
  php-ci:
    name: PHP CI (DDEV)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up DDEV (auto-starts the project)
        uses: ddev/github-action-setup-ddev@v1

      - name: DDEV info (debug aid for downstream failures)
        run: ddev describe

      - name: composer ci:php:lint
        run: ddev exec -d /var/www/html composer ci:php:lint

      - name: composer ci:php:stan
        run: ddev exec -d /var/www/html composer ci:php:stan

      - name: composer ci:php:cs
        run: ddev exec -d /var/www/html composer ci:php:cs

      - name: composer ci:composer:validate
        run: ddev exec -d /var/www/html composer ci:composer:validate

      - name: Stop DDEV
        if: ${{ always() }}
        run: ddev poweroff

  # Playwright runs the FE + BE smoke specs against the `test` database.
  # Flow:
  #   1. setup-ddev auto-starts the project → setup-typo3.sh runs `typo3
  #      setup` against BOTH `db` and `test`, writes additional.php with
  #      the X-Test-Run header switch.
  #      (The bootstrap's CSV seed import is skipped because node_modules
  #      doesn't exist yet on first `ddev start` — that's fine, the
  #      globalSetup in step 3 reseeds `test` anyway.)
  #   2. `ddev npm install` populates node_modules/ so globalSetup can
  #      invoke import-seeds.mjs.
  #   3. `ddev playwright test` runs the suite. Its globalSetup
  #      (Tests/playwright/scripts/global-setup.mjs) calls import-seeds.mjs
  #      with TYPO3_DB_NAME=test before the first worker spawns — every
  #      test session starts from a known seeded state in `test`. The dev
  #      `db` is untouched (no editor → no need to seed it in CI).
  playwright:
    name: Playwright (DDEV)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up DDEV (auto-starts the project)
        uses: ddev/github-action-setup-ddev@v1

      - name: Install npm dependencies (in DDEV web container)
        run: ddev npm install --no-audit --no-fund

      - name: DDEV info (debug aid for downstream failures)
        run: ddev describe

      - name: ddev playwright test
        # globalSetup (playwright.config.ts) seeds `test` via import-seeds.mjs
        # before workers spawn, so no explicit pre-step is needed here.
        run: ddev playwright test

      - name: Upload Playwright HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces / screenshots / videos
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop DDEV
        if: ${{ always() }}
        run: ddev poweroff
