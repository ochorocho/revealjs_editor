name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel a previous run on the same ref when a newer commit arrives
# (saves CI minutes on PRs that get pushed to repeatedly).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PHP CI runs the five `composer ci:*` scripts. None of them touch the
  # seeded `db` content (PHPUnit Functional tests spin up their own
  # `functional_*` databases via typo3/testing-framework), so this job
  # skips the npm install + ddev restart dance the Playwright job needs.
  php-ci:
    name: PHP CI (DDEV)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up DDEV (auto-starts the project)
        uses: ddev/github-action-setup-ddev@v1

      - name: DDEV info (debug aid for downstream failures)
        run: ddev describe

      - name: composer ci:php:lint
        run: ddev exec -d /var/www/html composer ci:php:lint

      - name: composer ci:php:stan
        run: ddev exec -d /var/www/html composer ci:php:stan

      - name: composer ci:php:cs
        run: ddev exec -d /var/www/html composer ci:php:cs

      - name: composer ci:php:test
        run: ddev exec -d /var/www/html composer ci:php:test

      - name: composer ci:composer:validate
        run: ddev exec -d /var/www/html composer ci:composer:validate

      - name: Stop DDEV
        if: ${{ always() }}
        run: ddev poweroff

  # Playwright runs the FE + BE smoke specs against the dev `db` database.
  # Two-stage bootstrap: setup-ddev auto-starts and triggers
  # setup-typo3.sh BEFORE node_modules exists, so the bootstrap's CSV
  # import is skipped on first run. We then `ddev npm install` to populate
  # node_modules/, followed by `ddev restart` which re-runs the
  # (idempotent) bootstrap — this time the CSV import branch fires and
  # seeds `db` with the per-table fixtures the tests expect.
  playwright:
    name: Playwright (DDEV)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up DDEV (auto-starts the project)
        uses: ddev/github-action-setup-ddev@v1

      - name: Install npm dependencies (in DDEV web container)
        run: ddev npm install --no-audit --no-fund

      - name: Re-run DDEV bootstrap so CSV seeds get imported
        run: ddev restart

      - name: DDEV info (debug aid for downstream failures)
        run: ddev describe

      - name: ddev playwright test
        run: ddev playwright test

      - name: Upload Playwright HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces / screenshots / videos
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop DDEV
        if: ${{ always() }}
        run: ddev poweroff
