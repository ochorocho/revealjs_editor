<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<section data-transition="{data.tx_revealjseditor_transition}"
         data-state="{data.tx_revealjseditor_data_state}"
         class="{data.tx_revealjseditor_data_state}">
    <header class="reveal-slide-title">
        <f:mark.contentArea colPos="220" txContainerParent="{data.uid}">
            <f:for each="{children_220}" as="child">
                <f:format.raw>{child.renderedContent}</f:format.raw>
            </f:for>
        </f:mark.contentArea>
    </header>
    <div class="reveal-slide-body">
        <f:mark.contentArea colPos="221" txContainerParent="{data.uid}">
            <f:for each="{children_221}" as="child">
                <f:format.raw>{child.renderedContent}</f:format.raw>
            </f:for>
        </f:mark.contentArea>
    </div>
</section>
</html>
