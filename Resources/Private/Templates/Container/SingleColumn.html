<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:comment>
  Single-column slide body. The surrounding section element with per-slide
  attributes (data-transition / data-state / class) is emitted by the page
  template's recordAs block.
</f:comment>
<f:mark.contentArea colPos="200" txContainerParent="{data.uid}">
    <f:for each="{children_200}" as="child">
        <f:format.raw>{child.renderedContent}</f:format.raw>
    </f:for>
</f:mark.contentArea>
</html>
