<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<section data-transition="{data.tx_revealjseditor_transition}"
         data-state="{data.tx_revealjseditor_data_state}"
         class="{data.tx_revealjseditor_data_state}">
    <f:mark.contentArea colPos="200" txContainerParent="{data.uid}">
        <f:for each="{children_200}" as="child">
            <f:format.raw>{child.renderedContent}</f:format.raw>
        </f:for>
    </f:mark.contentArea>
</section>
</html>
