imports:
  - { resource: "EXT:rte_ckeditor/Configuration/RTE/Default.yaml" }

# A trimmed RTE preset suited to slide content. Headings are limited to
# h2/h3 because h1 is reserved for the slide-deck-level wrapper, and each
# <section> typically holds at most one h2.
editor:
  config:
    toolbar:
      items:
        - heading
        - '|'
        - bold
        - italic
        - link
        - '|'
        - bulletedList
        - numberedList
        - '|'
        - removeFormat
    heading:
      options:
        - { model: paragraph, title: Paragraph }
        - { model: heading2, view: h2, title: Heading 2 }
        - { model: heading3, view: h3, title: Heading 3 }
